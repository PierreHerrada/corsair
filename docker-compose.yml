services:
  corsair:
    build: .
    ports:
      - "80:80"
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point to the compose postgres service
      DATABASE_URL: postgres://corsair:corsair@postgres:5432/corsair
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: corsair
      POSTGRES_USER: corsair
      POSTGRES_PASSWORD: corsair
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corsair"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
